<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空艦隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #0a0a1a;
            overflow: hidden;
            margin: 0;
            padding: 0;
            transition: opacity 0.5s;
        }
        
        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a2a4a 0%, #0f1a30 50%, #0a0a1a 100%);
            z-index: -10;
        }
        
        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity, 0.2); }
            50% { opacity: var(--max-opacity, 0.8); }
        }
        
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.2;
            z-index: -4;
            mix-blend-mode: screen;
            animation: nebulaFloat 30s infinite alternate ease-in-out;
        }
        
        @keyframes nebulaFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(var(--x, 5%), var(--y, 5%)) scale(1.1); }
        }
        
        .wormhole {
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(59, 130, 246, 0.05) 10%,
                transparent 20%,
                rgba(239, 68, 68, 0.05) 30%,
                transparent 40%,
                rgba(59, 130, 246, 0.05) 50%,
                transparent 60%,
                rgba(239, 68, 68, 0.05) 70%,
                transparent 80%,
                rgba(59, 130, 246, 0.05) 90%,
                transparent 100%
            );
            z-index: -5;
            opacity: 0.3;
            animation: wormholeRotate 60s linear infinite;
        }
        
        @keyframes wormholeRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .vs-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) 1.2s;
        }
        
        .vs-container.active {
            opacity: 1;
            transform: scale(1);
        }
        
        .vs-text {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            z-index: 2;
            animation: vsGlow 3s infinite alternate;
        }
        
        @keyframes vsGlow {
            0% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 25px rgba(255, 255, 255, 0.8),
                             0 0 40px rgba(96, 165, 250, 0.5),
                             0 0 60px rgba(239, 68, 68, 0.3);
                transform: scale(1.05);
            }
        }
        
        .vs-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: vsRingExpand 4s infinite;
        }
        
        @keyframes vsRingExpand {
            0% {
                width: 60px;
                height: 60px;
                opacity: 0.6;
            }
            100% {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }
        
        .energy-field {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: energyPulse 4s infinite alternate;
        }
        
        @keyframes energyPulse {
             0% { transform: scale(0.9); opacity: 100% }
            100% { transform: scale(1.1); opacity: 0.2 }
        }
        
        .player-card {
            position: relative;
            width: 320px;
            height: 450px;
            border: 2px solid;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 10;
            opacity: 0;
        }
        
        .player-card:hover {
            transform: translateY(-8px);
        }
        
        .player-blue {
            border-color: #3B82F6;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            transform: translateX(-200%);
        }
        
        .player-blue.active {
            transform: translateX(0);
            opacity: 1;
            transition: transform 1s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.5s ease;
        }
        
        .player-blue:hover {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.7);
        }
        
        .player-red {
            border-color: #EF4444;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.5);
            transform: translateX(200%);
        }
        
        .player-red.active {
            transform: translateX(0);
            opacity: 1;
            transition: transform 1s cubic-bezier(0.22, 0.61, 0.36, 1);
            opacity: 0.5s ease;
        }
        
        .player-red:hover {
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.7);
        }
        
        .player-image {
            width: 100%;
            height: 85%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .player-info {
            padding: 1rem;
            height: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .player-name {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .holographic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.03) 0px,
                rgba(255, 255, 255, 0.05) 1px,
                rgba(255, 255, 255, 0.03) 2px
            );
            pointer-events: none;
            z-index: 5;
        }
        
        .holographic-glare {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            animation: holographicGlare 8s infinite linear;
            pointer-events: none;
            z-index: 6;
        }
        
        @keyframes holographicGlare {
            0% { transform: rotate(0deg) translate(-50%, -50%);
 }
            100% { transform: rotate(360deg) translate(-50%, -50%);
 }
        }
        
        .countdown {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            font-weight: 900;
            color: countdownFade 1s ease-in-out forwards;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: 0;
        }
        
        @keyframes countdownFade {
            0% {
                opacity: 0;
                transform: translate(-50%, 20px) scale(0.8);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -20px) scale(0.8);
            }
        }
        
        .spaceship {
            filter: drop-shadow(0 0 10px var(--glow-color));
            animation: floatShip 6s ease-in-out infinite);
            transform-origin: center;
            z-index: 2;
        }
        
        .spaceship-blue {
            --glow-color: rgba(59, 130, 246, 0.7);
        }
        
        .spaceship-red {
            --glow-red: rgba(239, 68, 68, 0.7);
            --rotate: 2deg;
        }
        
        @keyframes floatShip {
            0% 100%, 
0 {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(var(--rotate, 0deg));
            }
        }
        
        .engine-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.8;
            animation: enginePulse 2s infinite alternate;
            z-index: 1;
        }
        
        @keyframes enginePulse {
            0% {
                opacity: 0.6;
                transform: scale(0.9);
            }
            100% {
                opacity: 0.9;
                transform: scale(1.2);
            }
        }
        
        .tech-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(var(--grid-color), 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(var(--grid-color), 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }
        
        .energy-beam {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--beam-color), transparent);
            opacity: 0.7;
            animation: beamMove var(--duration) infinite linear;
            z-index: 1;
        }
        
        @keyframes beamMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .shield {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            opacity: 0.3;
            animation: shieldPulse 3s infinite alternate;
        }
        
        @keyframes shieldPulse {
            0% { transform: scale(0.95); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.4; }
        }
        
        .name-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .name-modal-content {
            background: linear-gradient(135deg, #1a2a4a 0%, #0f172a 100%);
            border: 2px solid #3B82F6;
            border-radius: 15px;
            padding: 2.5rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .modal-tech-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }
        
        .name-input {
            width: 100%;
            padding: 0.75rem;
            margin: 1.5rem 0;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 8px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
        }
        
        .name-input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        
        .submit-btn {
            background: linear-gradient(to right, #3B82F6, #1D4ED8);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .submit-btn:hover {
            background: linear-gradient(to right, #2563EB, #1E40AF);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
        }
        
        .submit-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            animation: buttonGlare 3s infinite linear;
        }
        
        @keyframes buttonGlare {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }
        
        .speed-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .speed-lines.active {
            opacity: 1;
        }
        
        .speed-line {
            position: absolute;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            transform-origin: center left;
        }
        
        .shockwave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid white;
            opacity: 0;
            z-index: 20;
        }
        
        .shockwave.active {
            animation: shockwaveExpand 1s forwards;
        }
        
        @keyframes shockwaveExpand {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(20);
                opacity: 0;
            }
        }
        
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            z-index: 15;
            pointer-events: none;
        }
        
        .flash.active {
            animation: flashEffect 0.5s forwards;
        }
        
        @keyframes flashEffect {
            0% { opacity: 0; }
            10% { opacity: 0.7; }
            100% { opacity:0; }
        }
        
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
        }
        
        .thruster-flame {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            filter: blur(2px);
            transform-origin: center top;
            z-index: 1;
        }
        
        .thruster-flame.active {
            animation: thrusterFlame 0.3s infinite alternate;
            opacity: 1;
        }
        
        @keyframes thrusterFlame {
            0% {
                transform: scaleY(0.8) scaleX(0.9);
                opacity: 0.7;
            }
            100% {
                transform: scaleY(1); scaleX(1);
                opacity: 0.9;
            }
        }
        
        .matching-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            opacity: 0;
            z-index: 100;
        }
        
        .matching-text.active {
            animation: matchingTextAnim 2s forwards;
        }
        
        @keyframes matchingTextAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="space-background"></div>
    <div class="wormhole"></div>
    <div class="stars-layer" id="stars-layer"></div>
    <div class="nebula" style="width: 800px; height: 800px; background: radial-gradient(circle, #4c1d95 0%, transparent 70%); top: -200px; right: -200px; --x: -8%; --y: 5%;"></div>
    <div class="nebula" style="width: 700px; height: 700px; background: radial-gradient(circle, #1e40af 0%, transparent 70%); bottom: -200px; left: -200px; --x: 8%; --y: -5%;"></div>
    <div class="nebula" style="width: 600px; height: 600px; background: radial-gradient(circle, #991b1b 0%, transparent 70%); top: 50%; left: -300px; --x: 10%; --y: 3%;"></div>
    <div class="nebula" style="width: 500px; height: 500px; background: radial-gradient(circle, #0369a1 0%, transparent 70%); bottom: 10%; right: -200px; --x: -5%; --y: -8%;"></div>
    <div class="speed-lines" id="speedLines"></div>
    <div class="particles-container" id="particlesContainer"></div>
    <div class="flash" id="flashEffect"></div>
    <div class="shockwave" id="shockwave"></div>
    <div class="matching-text" id="matchingText">對手配對中...</div>

    <div class="relative min-h-screen flex flex-col items-center justify-center px-4">
        <div class="flex items-center justify-center gap-4 md:gap-20 z-10">
            <div class="player-card player-blue" id="playerCard">
                <div class="player-image" style="background: linear-gradient(to bottom, #0f172a, #1e3a8a);">
                    <div class="tech-grid" style="--grid-color: 59, 130, 246"></div>
                    <div class="shield" style="width: 280px; height: 280px; border-color: rgba(59, 130, 246, 0.5);"></div>
                    <div class="energy-beam" style="width: 100px; top: 30%; left: 10%; --beam-color: #60A5FA; --duration: 2s;"></div>
                    <div class="energy-beam" style="width: 150px; top: 60%; left: 20%; --beam-color: #60A5FA; --duration: 3s;"></div>
                    <div class="energy-beam" style="width: 80px; top: 80%; left: 15%; --beam-color: #60A5FA; --duration: 2.5s;"></div>
                    <svg class="spaceship spaceship-blue" width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
                        <path d="M120 20 L160 70 L140 160 L100 160 L80 70 Z" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1.5"/>
                        <ellipse cx="120" cy="60" rx="20" ry="15" fill="#60A5FA" stroke="#FFFFFF" stroke-width="1"/>
                        <ellipse cx="120" cy="60" rx="14" ry="10" fill="#DBEAFE" stroke="#FFFFFF" stroke-width="0.5"/>
                        <path d="M110 55 L130 55" stroke="#1E40AF" stroke-width="1"/>
                        <path d="M110 60 L130 60" stroke="#1E40AF" stroke-width="1"/>
                        <path d="M110 65 L130 65" stroke="#1E40AF" stroke-width="1"/>
                        <path d="M80 70 L40 100 L60 130 L100 160" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1.5"/>
                        <path d="M160 70 L200 100 L180 130 L140 160" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1.5"/>
                        <path d="M60 85 L90 110" stroke="#60A5FA" stroke-width="1.5"/>
                        <path d="M180 85 L150 110" stroke="#60A5FA" stroke-width="1.5"/>
                        <circle cx="50" cy="100" r="8" fill="#60A5FA" stroke="#FFFFFF" stroke-width="1"/>
                        <circle cx="190" cy="100" r="8" fill="#60A5FA" stroke="#FFFFFF" stroke-width="1"/>
                        <rect x="105" y="160" width="12" height="25" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1"/>
                        <rect x="125" y="160" width="12" height="25" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1"/>
                        <path d="M105 185 L111 195 L117 185" fill="#60A5FA" stroke="#FFFFFF" stroke-width="0.5"/>
                        <path d="M125 185 L131 195 L137 185" fill="#60A5FA" stroke="#FFFFFF" stroke-width="0.5"/>
                        <circle cx="120" cy="100" r="10" fill="none" stroke="#FFFFFF" stroke-width="1"/>
                        <circle cx="120" cy="100" r="5" fill="#60A5FA"/>
                        <path d="M100 40 L140 40" stroke="#60A5FA" stroke-width="1.5"/>
                        <path d="M90 140 L150 140" stroke="#60A5FA" stroke-width="1.5"/>
                        <circle cx="90" cy="60" r="6" fill="#60A5FA" stroke="#FFFFFF" stroke-width="0.5"/>
                        <circle cx="150" cy="60" r="6" fill="#60A5FA" stroke="#FFFFFF" stroke-width="0.5"/>
                        <rect x="100" y="80" width="40" height="10" fill="none" stroke="#60A5FA" stroke-width="1"/>
                        <rect x="95" y="100" width="50" height="15" fill="none" stroke="#60A5FA" stroke-width="1"/>
                        <rect x="100" y="125" width="40" height="10" fill="none" stroke="#60A5FA" stroke-width="1"/>
                        <path d="M70 90 L90 90" stroke="#DBEAFE" stroke-width="1" stroke-dasharray="2,2"/>
                        <path d="M150 90 L170 90" stroke="#DBEAFE" stroke-width="1" stroke-dasharray="2,2"/>
                        <path d="M70 110 L90 110" stroke="#DBEAFE" stroke-width="1" stroke-dasharray="2,2"/>
                        <path d="M150 110 L170 110" stroke="#DBEAFE" stroke-width="1" stroke-dasharray="2,2"/>
                    </svg>
                    <div class="engine-glow" style="width: 15px; height: 15px; background-color: #60A5FA; bottom: 40px; left: 111px;"></div>
                    <div class="engine-glow" style="width: 15px; health: 15px; background-color: #60A5FA; bottom: 40px; left: 131px;"></div>
                    <div class="thruster-flame" id="leftThrusterBlue" style="border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 30px solid #60A5FA; bottom: 10px; left: 106px;"></div>
                    <div class="thruster-flame" id="rightThrusterBlue" style="border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 30px solid #60A5FA; bottom: 10px; left: 126px;"></div>
                    <div class="holographic-overlay"></div>
                    <div class="holographic-glare"></div>
                </div>
                <div class="player-info bg-gray-900 text-blue-400">
                    <div class="player-name" id="player-name">太空艦長</div>
                </div>
            </div>
            <div class="vs-container" id="vsContainer">
                <div class="energy-field"></div>
                <div class="vs-ring"></div>
                <div class="vs-ring" style="animation-delay: 1.5s;"></div>
                <div class="vs-text">VS</div>
            </div>
            <div class="player-card player-red" id="enemyCard">
                <div class="player-image" style="background: linear-gradient(to bottom, #1f1212, #991b1b);">
                    <div class="tech-grid" style="--grid-color: 239, 68, 68"></div>
                    <div class="shield" style="width: 280px; height: 280px; border-color: rgba(239, 68, 68, 0.5);"></div>
                    <div class="energy-beam" style="width: 120px; top: 40%; right: 10%; --beam-color: #F87171; --duration: 2.2s;"></div>
                    <div class="energy-beam" style="width: 170px; top: 70%; right: 20%; --beam-color: #F87171; --duration: 3.2s;"></div>
                    <div class="energy-beam" style="width: 90px; top: 20%; right: 15%; --beam-color: #F87171; --duration: 2.7s;"></div>
                    <svg class="spaceship spaceship-red" width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="--rotate: 2deg;">
                        <path d="M70 40 L170 40 L190 100 L120 170 L50 100 Z" fill="#991B1B" stroke="#FFFFFF" stroke-width="1.5"/>
                        <path d="M90 40 L150 40 L150 70 L120 90 L90 70 Z" fill="#F87171" stroke="#FFFFFF" stroke-width="1"/>
                        <ellipse cx="120" cy="60" rx="15" ry="18" fill="#FECACA" stroke="#FFFFFF" stroke-width="0.5"/>
                        <path d="M110 55 L130 55" stroke="#991B1B" stroke-width="1"/>
                        <path d="M110 60 L130 60" stroke="#991B1B" stroke-width="1"/>
                        <path d="M110 65 L130 65" stroke="#991B1B" stroke-width="1"/>
                        <path d="M60 70 L20 70 L50 100" fill="#991B1B" stroke="#FFFFFF" stroke-width="1.5"/>
                        <path d="M180 70 L220 70 L190 100" fill="#991B1B" stroke="#FFFFFF" stroke-width="1.5"/>
                        <circle cx="40" cy="70" r="8" fill="#F87171" stroke="#FFFFFF" stroke-width="0.5"/>
                        <circle cx="200" cy="70" r="8" fill="#F87171" stroke="#FFFFFF" stroke-width="0.5"/>
                        <path d="M35 65 L45 75" stroke="#FECACA" stroke-width="1"/>
                        <path d="M45 65 L35 75" stroke="#FECACA" stroke-width="1"/>
                        <path d="M195 65 L205 75" stroke="#FECACA" stroke-width="1"/>
                        <path d="M205 65 L195 75" stroke="#FECACA" stroke-width="1"/>
                        <rect x="110" y="170" width="20" height="20" fill="#991B1B" stroke="#FFFFFF" stroke-width="1"/>
                        <path d="M110 190 L120 200 L130 190" fill="#F87171" stroke="#FFFFFF" stroke-width="0.5"/>
                        <path d="M80 100 L160 100" stroke="#F87171" stroke-width="1.5"/>
                        <path d="M70 120 L170 120" stroke="#F87171" stroke-width="1.5"/>
                        <path d="M80 140 L160 140" stroke="#F87171" stroke-width="1.5"/>
                        <circle cx="80" cy="60" r="10" fill="none" stroke="#FFFFFF" stroke-width="1"/>
                        <circle cx="160" cy="60" r="10" fill="none" stroke="#FFFFFF" stroke-width="1"/>
                        <rect x="90" y="80" width="60" height="10" fill="none" stroke="#F87171" stroke-width="1"/>
                        <rect x="80" y="110" width="80" height="15" fill="none" stroke="#F87171" stroke-width="1"/>
                        <rect x="90" y="135" width="60" height="10" fill="none" stroke="#F87171" stroke-width="1"/>
                        <path d="M60 90 L80 90" stroke="#FECACA" stroke-width="1" stroke-dasharray="2,2"/>
                        <path d="M160 90 L180 90" stroke="#FECACA" stroke-width="1" stroke-dasharray="2,2"/>
                        <path d="M60 110 L80 110" stroke="#FECACA" stroke-width="1" stroke-dasharray="2,2"/>
                        <path d="M160 110 L180 110" stroke="#FECACA" stroke-width="1" stroke-dasharray="2,2"/>
                        <circle cx="70" cy="130" r="5" fill="#F87171" stroke="#FFFFFF" stroke-width="0.5"/>

                    </svg>
                    <div class="engine-glow" style="width: 20px; height: 20px; background-color: #F87171; bottom: 40px; left: 120px;"></div>
                    <div class="thruster-flame" id="thrusterRed" style="border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 40px solid #F87171; bottom: 10px; left: 115px;"></div>
                    <div class="holographic-overlay"></div>
                    <div class="holographic-glare"></div>
                </div>
                <div class="player-info bg-gray-900 text-red-400">
                    <div class="player-name" id="enemy-name">星際掠奪者</div>
                </div>
            </div>
        </div>
        <div id="countdown" class="countdown">3</div>
    </div>

    <div class="name-modal" id="nameModal">
        <div class="name-modal-content">
            <div class="modal-tech-lines"></div>
            <h2 class="text-3xl font-bold text-blue-400 mb-4 text-center">輸入你的名稱</h2>
            <input type="text" id="playerNameInput" class="name-input" placeholder="太空艦長" maxlength="10">
            <div class="flex justify-center mt-6">
                <button id="submitName" class="submit-btn">開始對決</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io('http://localhost:3000'); // 替換為你的後端 URL

        function createStars() {
            const starsLayer = document.getElementById('stars-layer');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = 0.5 + Math.random() * 3;
                const duration = 3 + Math.random() * 7;
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                let color = '#FFFFFF';
                const colorRand = Math.random();
                if (colorRand > 0.95) color = '#60A5FA';
                else if (colorRand > 0.9) color = '#F87171';
                else if (colorRand > 0.85) color = '#FBBF24';
                const brightness = Math.min(0.7 + (size / 3) * 0.3, 1);
                star.style.backgroundColor = color;
                if (size > 1.5) {
                    star.style.boxShadow = `0 0 ${size * 2}px ${color.replace(')', ', ' + brightness * 0.7 + ')')}`;
                }
                star.style.setProperty('--duration', `${duration}s`);
                star.style.setProperty('--min-opacity', '0.2');
                star.style.setProperty('--max-opacity', '0.9');
                starsLayer.appendChild(star);
            }
        }

        function createSpeedLines() {
            const speedLinesContainer = document.getElementById('speedLines');
            for (let i = 0; i < 60; i++) {
                const line = document.createElement('div');
                line.classList.add('speed-line');
                const y = Math.random() * 100;
                const width = 20 + Math.random() * 100;
                const delay = Math.random() * 1;
                const duration = 0.2 + Math.random() * 0.3;
                const opacity = 0.3 + Math.random() * 0.5;
                line.style.top = `${y}%`;
                line.style.width = `${width}px`;
                line.style.opacity = opacity;
                line.style.animation = `beamMove ${duration}s ${delay}s linear`;
                speedLinesContainer.appendChild(line);
            }
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particlesContainer');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particlesContainer.appendChild(particle);
            }
        }

        function animateParticles() {
            const particles = document.querySelectorAll('.particle');
            particles.forEach(particle => {
                const x = window.innerWidth / 2 + (Math.random() - 0.5) * 20;
                const y = window.innerHeight / 2 + (Math.random() - 0.5) * 20;
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const duration = 0.5 + Math.random() * 1;
                const delay = Math.random() * 0.3;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                const endX = x + Math.cos(angle) * distance;
                const endY = y + Math.sin(angle) * distance;
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${endX - x}px, ${endY - y}px) scale(0)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });
            });
        }

        function startCountdown() {
            const countdownElement = document.getElementById('countdown');
            let count = 3;
            countdownElement.textContent = count;
            countdownElement.style.animation = 'none';
            void countdownElement.offsetWidth;
            countdownElement.style.animation = 'countdownFade 1s ease-in-out forwards';
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownElement.textContent = count;
                    countdownElement.style.animation = 'none';
                    void countdownElement.offsetWidth;
                    countdownElement.style.animation = 'countdownFade 1s ease-in-out forwards';
                } else if (count === 0) {
                    countdownElement.textContent = '開始!';
                    countdownElement.style.animation = 'none';
                    void countdownElement.offsetWidth;
                    countdownElement.style.animation = 'countdownFade 1s ease-in-out forwards';
                } else {
                    clearInterval(interval);
                    document.body.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = 'game.html';
                    }, 500);
                }
            }, 1000);
        }

        function animateShipEntry() {
            const matchingText = document.getElementById('matchingText');
            matchingText.classList.add('active');
            setTimeout(() => {
                const speedLines = document.getElementById('speedLines');
                speedLines.classList.add('active');
                document.getElementById('leftThrusterBlue').classList.add('active');
                document.getElementById('rightThrusterBlue').classList.add('active');
                document.getElementById('thrusterRed').classList.add('active');
                const playerCard = document.getElementById('playerCard');
                playerCard.classList.add('active');
                const enemyCard = document.getElementById('enemyCard');
                enemyCard.classList.add('active');
                setTimeout(() => {
                    const flash = document.getElementById('flashEffect');
                    flash.classList.add('active');
                    const shockwave = document.getElementById('shockwave');
                    shockwave.classList.add('active');
                    animateParticles();
                    setTimeout(() => {
                        const vsContainer = document.getElementById('vsContainer');
                        vsContainer.classList.add('active');
                        setTimeout(() => {
                            startCountdown();
                        }, 1000);
                    }, 500);
                }, 1000);
            }, 2000);
        }

        function setupNameInput() {
            const nameModal = document.getElementById('nameModal');
            const submitButton = document.getElementById('submitName');
            const nameInput = document.getElementById('playerNameInput');
            const playerNameDisplay = document.getElementById('player-name');
            submitButton.addEventListener('click', () => {
                const playerName = nameInput.value.trim() || '太空艦長';
                playerNameDisplay.textContent = playerName;
                localStorage.setItem('playerName', playerName);
                nameModal.style.display = 'none';
                socket.emit('joinMatchmaking', { name: playerName });
            });
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitButton.click();
            });
            setTimeout(() => nameInput.focus(), 500);
        }

        socket.on('matchFound', ({ roomId, players }) => {
            const opponentId = Object.keys(players).find(id => id !== socket.id);
            const enemyNameDisplay = document.getElementById('enemy-name');
            enemyNameDisplay.textContent = players[opponentId].name || '星際掠奪者';
            localStorage.setItem('roomId', roomId);
            animateShipEntry();
        });

        function initialize() {
            createStars();
            createSpeedLines();
            createParticles();
            setupNameInput();
        }

        initialize();
    </script>
</body>
</html>
