<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射擊遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }
        
        .player {
            position: absolute;
            width: 40px;
            height: 40px;
            transform-origin: center;
            transition: transform 0.1s;
            z-index: 10;
        }
        
        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            transform-origin: center;
            z-index: 10;
        }
        
        .bullet {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #5eead4;
            border-radius: 50%;
            transform-origin: center;
            box-shadow: 0 0 10px #5eead4, 0 0 20px #5eead4;
            z-index: 5;
        }
        
        .enemy-bullet {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f87171;
            border-radius: 50%;
            transform-origin: center;
            box-shadow: 0 0 10px #f87171, 0 0 20px #f87171;
            z-index: 5;
        }
        
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            z-index: 1;
        }
        
        .health-container {
            position: absolute;
            height: 20px;
            width: 220px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 3px;
            z-index: 20;
        }
        
        .health-bar {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
        }
        
        .title {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 2rem;
            text-align: center;
            text-shadow: 0 0 10px #5eead4, 0 0 20px #5eead4;
            animation: pulse 2s infinite;
        }
        
        .btn {
            background-color: transparent;
            border: 2px solid #5eead4;
            color: #5eead4;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1.2rem;
            margin: 10px 2px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            background-color: rgba(94, 234, 212, 0.2);
            box-shadow: 0 0 10px #5eead4, 0 0 20px #5eead4;
            transform: translateY(-3px);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .matchmaking {
            width: 80%;
            max-width: 600px;
            background-color: rgba(30, 41, 59, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #5eead4;
            box-shadow: 0 0 20px #5eead4;
        }
        
        .player-card {
            display: flex;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background-color: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            background-color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }
        
        .loading-bar {
            height: 10px;
            background-color: rgba(94, 234, 212, 0.3);
            border-radius: 5px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .loading-progress {
            position: absolute;
            height: 100%;
            background-color: #5eead4;
            border-radius: 5px;
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 10px #5eead4, 0 0 20px #5eead4;
        }
        
        .game-over {
            display: none;
        }
        
        .result-container {
            background-color: rgba(30, 41, 59, 0.8);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 2px solid #5eead4;
            box-shadow: 0 0 20px #5eead4;
            max-width: 500px;
            width: 80%;
            transform: scale(0.5);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .show-result {
            transform: scale(1);
            opacity: 1;
        }
        
        .result-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .win {
            color: #5eead4;
            text-shadow: 0 0 10px #5eead4;
        }
        
        .lose {
            color: #f87171;
            text-shadow: 0 0 10px #f87171;
        }
        
        .stats {
            margin: 20px 0;
            font-size: 1.2rem;
        }
        
        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            z-index: 15;
        }
        
        @keyframes pulse {
            0% { text-shadow: 0 0 10px #5eead4, 0 0 20px #5eead4; }
            50% { text-shadow: 0 0 15px #5eead4, 0 0 30px #5eead4, 0 0 40px #5eead4; }
            100% { text-shadow: 0 0 10px #5eead4, 0 0 20px #5eead4; }
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #5eead4;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotate 1s linear infinite;
            margin-left: 10px;
        }
        
        .score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 5px #000;
            z-index: 20;
        }
        
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.8);
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 遊戲元素 -->
        <div class="player" id="player">
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <polygon points="20,0 30,40 20,30 10,40" fill="#5eead4" stroke="#0891b2" stroke-width="1.5"/>
                <circle cx="20" cy="15" r="5" fill="#0891b2"/>
            </svg>
        </div>
        
        <div class="enemy" id="enemy">
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <polygon points="20,0 35,30 20,25 5,30" fill="#f87171" stroke="#b91c1c" stroke-width="1.5"/>
                <circle cx="20" cy="15" r="5" fill="#b91c1c"/>
            </svg>
        </div>
        
        <div class="health-container" style="bottom: 20px; left: 20px;">
            <div class="health-bar" id="player-health" style="width: 100%; background-color: #5eead4;"></div>
        </div>
        
        <div class="health-container" style="top: 20px; right: 20px;">
            <div class="health-bar" id="enemy-health" style="width: 100%; background-color: #f87171;"></div>
        </div>
        
        <div class="score" id="score">得分: 0</div>
        
        <!-- 開始畫面 -->
        <div class="screen" id="start-screen">
            <div class="title">太空射擊戰</div>
            <button class="btn" id="start-btn">開始遊戲</button>
            <p class="mt-8 text-gray-300">使用 WASD 或方向鍵移動，滑鼠瞄準，點擊射擊</p>
        </div>
        
        <!-- 匹配畫面 -->
        <div class="screen" id="matchmaking-screen" style="display: none;">
            <div class="matchmaking">
                <h2 class="text-2xl font-bold mb-4 text-center">尋找對手中...</h2>
                
                <div class="player-card">
                    <div class="avatar">👨‍🚀</div>
                    <div>
                        <div class="font-bold">你</div>
                        <div class="text-sm text-gray-300">準備就緒</div>
                    </div>
                </div>
                
                <div class="loading-bar">
                    <div class="loading-progress" id="loading-progress"></div>
                </div>
                
                <div class="player-card">
                    <div class="avatar">👽</div>
                    <div>
                        <div class="font-bold">對手</div>
                        <div class="text-sm text-gray-300">搜尋中 <span class="loader"></span></div>
                    </div>
                </div>
                
                <div class="text-center mt-4 text-sm text-gray-300">
                    預計等待時間: <span id="wait-time">15</span> 秒
                </div>
            </div>
        </div>
        
        <!-- 遊戲結束畫面 -->
        <div class="screen game-over" id="game-over">
            <div class="result-container" id="result-container">
                <div class="result-title" id="winner-text"></div>
                <div class="stats">
                    <div>得分: <span id="final-score">0</span></div>
                    <div>存活時間: <span id="survival-time">0</span> 秒</div>
                    <div>命中率: <span id="accuracy">0</span>%</div>
                </div>
                <button class="btn" id="restart-btn">再來一局</button>
                <button class="btn mt-3" id="menu-btn">返回主選單</button>
            </div>
        </div>
        
        <!-- 錯誤訊息 -->
        <div class="error-message" id="error-message"></div>
    </div>

    <script>
        // 初始化 Socket.IO
        const socket = io('https://game-backed.onrender.com'); // 替換為你的 Render 後端 URL

        // 遊戲元素
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const playerHealth = document.getElementById('player-health');
        const enemyHealth = document.getElementById('enemy-health');
        const scoreDisplay = document.getElementById('score');
        const errorMessage = document.getElementById('error-message');
        
        // 畫面
        const startScreen = document.getElementById('start-screen');
        const matchmakingScreen = document.getElementById('matchmaking-screen');
        const gameOverScreen = document.getElementById('game-over');
        const resultContainer = document.getElementById('result-container');
        const winnerText = document.getElementById('winner-text');
        const finalScore = document.getElementById('final-score');
        const survivalTime = document.getElementById('survival-time');
        const accuracyDisplay = document.getElementById('accuracy');
        
        // 按鈕
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const menuBtn = document.getElementById('menu-btn');
        
        // 匹配元素
        const loadingProgress = document.getElementById('loading-progress');
        const waitTime = document.getElementById('wait-time');
        
        // 遊戲變數
        let playerX = 100;
        let playerY = window.innerHeight / 2;
        let enemyX = window.innerWidth - 100;
        let enemyY = window.innerHeight / 2;
        let playerAngle = 0;
        let enemyAngle = 180;
        let playerHealthValue = 100;
        let enemyHealthValue = 100;
        let gameActive = false;
        let gameStartTime = 0;
        let score = 0;
        let shotsFired = 0;
        let shotsHit = 0;
        let roomId = null;
        let opponentId = null;
        
        const playerSpeed = 5;
        const bulletSpeed = 10;
        const bulletLifetime = 2000; // 子彈存活時間（毫秒）
        
        const keys = {};
        const bullets = [];
        const enemyBullets = [];
        
        // 創建星空背景
        function createStars() {
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.opacity = Math.random() * 0.8 + 0.2;
                
                if (Math.random() > 0.7) {
                    const duration = Math.random() * 3 + 2;
                    star.style.animation = `pulse ${duration}s infinite`;
                }
                
                gameContainer.appendChild(star);
            }
        }
        
        // 初始化遊戲
        function initGame() {
            playerHealthValue = 100;
            enemyHealthValue = 100;
            playerHealth.style.width = '100%';
            enemyHealth.style.width = '100%';
            score = 0;
            shotsFired = 0;
            shotsHit = 0;
            scoreDisplay.textContent = `得分: ${score}`;
            gameStartTime = Date.now();
            
            bullets.forEach(bullet => bullet.element.remove());
            bullets.length = 0;
            enemyBullets.forEach(bullet => bullet.element.remove());
            enemyBullets.length = 0;
            
            updatePositions();
        }
        
        // 更新位置
        function updatePositions() {
            player.style.left = `${playerX - 20}px`;
            player.style.top = `${playerY - 20}px`;
            player.style.transform = `rotate(${playerAngle}deg)`;
            
            enemy.style.left = `${enemyX - 20}px`;
            enemy.style.top = `${enemyY - 20}px`;
            enemy.style.transform = `rotate(${enemyAngle}deg)`;
        }
        
        // 創建子彈
        function createBullet(x, y, angle, isEnemy = false) {
            const bullet = document.createElement('div');
            bullet.classList.add(isEnemy ? 'enemy-bullet' : 'bullet');
            gameContainer.appendChild(bullet);
            
            const radians = angle * Math.PI / 180;
            const velocityX = Math.sin(radians) * bulletSpeed;
            const velocityY = -Math.cos(radians) * bulletSpeed;
            
            const bulletObj = {
                element: bullet,
                x: x,
                y: y,
                velocityX: velocityX,
                velocityY: velocityY,
                createdAt: Date.now(),
                owner: isEnemy ? opponentId : socket.id
            };
            
            if (isEnemy) {
                enemyBullets.push(bulletObj);
            } else {
                bullets.push(bulletObj);
            }
            
            bullet.style.left = `${x - 4}px`;
            bullet.style.top = `${y - 4}px`;
        }
        
        // 創建爆炸效果
        function createExplosion(x, y, color) {
            const explosion = document.createElement('div');
            explosion.classList.add('explosion');
            explosion.style.left = `${x}px`;
            explosion.style.top = `${y}px`;
            
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.style.width = "100%";
            svg.style.height = "100%";
            
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const length = 30 + Math.random() * 20;
                const x1 = 50;
                const y1 = 50;
                const x2 = 50 + Math.cos(angle) * length;
                const y2 = 50 + Math.sin(angle) * length;
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1);
                line.setAttribute("y1", y1);
                line.setAttribute("x2", x2);
                line.setAttribute("y2", y2);
                line.setAttribute("stroke", color sasaran, color);
                line.setAttribute("stroke-width", "3");
                
                const animate = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                animate.setAttribute("attributeName", "opacity");
                animate.setAttribute("from", "1");
                animate.setAttribute("to", "0");
                animate.setAttribute("dur", "0.5s");
                animate.setAttribute("fill", "freeze");
                
                line.appendChild(animate);
                svg.appendChild(line);
            }
            
            explosion.appendChild(svg);
            gameContainer.appendChild(explosion);
            
            setTimeout(() => {
                explosion.remove();
            }, 500);
        }
        
        // 更新子彈
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.x += bullet.velocityX;
                bullet.y += bullet.velocityY;
                
                if (bullet.x < 0 || bullet.x > window.innerWidth || 
                    bullet.y < 0 || bullet.y > window.innerHeight ||
                    Date.now() - bullet.createdAt > bulletLifetime) {
                    bullet.element.remove();
                    bullets.splice(i, 1);
                    continue;
                }
                
                if (bullet.owner === socket.id && Math.hypot(bullet.x - enemyX, bullet.y - enemyY) < 20) {
                    bullet.element.remove();
                    bullets.splice(i, 1);
                    socket.emit('bulletHit', { targetId: opponentId, damage: 10 });
                    shotsHit++;
                    createExplosion(enemyX, enemyY, "#f87171");
                    continue;
                }
                
                bullet.element.style.left = `${bullet.x - 4}px`;
                bullet.element.style.top = `${bullet.y - 4}px`;
            }
            
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                bullet.x += bullet.velocityX;
                bullet.y += bullet.velocityY;
                
                if (bullet.x < 0 || bullet.x > window.innerWidth || 
                    bullet.y < 0 || bullet.y > window.innerHeight ||
                    Date.now() - bullet.createdAt > bulletLifetime) {
                    bullet.element.remove();
                    enemyBullets.splice(i, 1);
                    continue;
                }
                
                bullet.element.style.left = `${bullet.x - 4}px`;
                bullet.element.style.top = `${bullet.y - 4}px`;
            }
        }
        
        // 開始匹配
        function startMatchmaking() {
            startScreen.style.display = 'none';
            matchmakingScreen.style.display = 'flex';
            socket.emit('joinMatchmaking');
        }
        
        // 遊戲結束
        function gameOver(message, isWin) {
            gameActive = false;
            const gameTime = Math.floor((Date.now() - gameStartTime) / 1000);
            const accuracy = shotsFired > 0 ? Math.floor((shotsHit / shotsFired) * 100) : 0;
            
            winnerText.textContent = message;
            winnerText.className = 'result-title ' + (isWin ? 'win' : 'lose');
            finalScore.textContent = score;
            survivalTime.textContent = gameTime;
            accuracyDisplay.textContent = accuracy;
            
            gameOverScreen.style.display = 'flex';
            setTimeout(() => {
                resultContainer.classList.add('show-result');
            }, 100);
        }
        
        // 顯示錯誤訊息
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }
        
        // Socket.IO 事件
        socket.on('connect_error', () => {
            showError('無法連接到伺服器，請稍後再試！');
        });
        
        socket.on('matchmakingProgress', ({ progress, timeLeft }) => {
            loadingProgress.style.width = `${progress}%`;
            waitTime.textContent = timeLeft;
        });
        
        socket.on('matchFound', ({ roomId: newRoomId, players }) => {
            roomId = newRoomId;
            matchmakingScreen.style.display = 'none';
            gameActive = true;
            initGame();
            opponentId = Object.keys(players).find(id => id !== socket.id);
            playerX = players[socket.id].x;
            playerY = players[socket.id].y;
            playerAngle = players[socket.id].angle;
            playerHealthValue = players[socket.id].health;
            enemyX = players[opponentId].x;
            enemyY = players[opponentId].y;
            enemyAngle = players[opponentId].angle;
            enemyHealthValue = players[opponentId].health;
            updatePositions();
        });
        
        socket.on('gameStateUpdate', (gameState) => {
            if (gameState.players[opponentId]) {
                enemyX = gameState.players[opponentId].x;
                enemyY = gameState.players[opponentId].y;
                enemyAngle = gameState.players[opponentId].angle;
                enemyHealthValue = gameState.players[opponentId].health;
                score = gameState.players[socket.id].score;
                playerHealthValue = gameState.players[socket.id].health;
                scoreDisplay.textContent = `得分: ${score}`;
                playerHealth.style.width = `${playerHealthValue}%`;
                enemyHealth.style.width = `${enemyHealthValue}%`;
            }
            bullets.forEach(b => b.element.remove());
            enemyBullets.forEach(b => b.element.remove());
            bullets.length = 0;
            enemyBullets.length = 0;
            gameState.bullets.forEach(bullet => {
                createBullet(
                    bullet.x,
                    bullet.y,
                    Math.atan2(bullet.velocityX, -bullet.velocityY) * 180 / Math.PI,
                    bullet.owner !== socket.id
                );
            });
        });
        
        socket.on('gameOver', ({ winner, scores, message }) => {
            const isWin = winner === socket.id;
            gameOver(message || (isWin ? '你獲勝了！' : '你失敗了！'), isWin);
        });
        
        // 事件監聽
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        window.addEventListener('mousemove', (e) => {
            if (gameActive) {
                const dx = e.clientX - playerX;
                const dy = e.clientY - playerY;
                playerAngle = Math.atan2(dx, -dy) * 180 / Math.PI;
                socket.emit('playerMove', { x: playerX, y: playerY, angle: playerAngle });
                player.style.transform = `rotate(${playerAngle}deg)`;
            }
        });
        
        window.addEventListener('mousedown', (e) => {
            if (gameActive) {
                socket.emit('playerShoot', { x: playerX, y: playerY, angle: playerAngle });
                shotsFired++;
            }
        });
        
        startBtn.addEventListener('click', startMatchmaking);
        
        restartBtn.addEventListener('click', () => {
            resultContainer.classList.remove('show-result');
            setTimeout(() => {
                gameOverScreen.style.display = 'none';
                startMatchmaking();
            }, 300);
        });
        
        menuBtn.addEventListener('click', () => {
            resultContainer.classList.remove('show-result');
            setTimeout(() => {
                gameOverScreen.style.display = 'none';
                startScreen.style.display = 'flex';
            }, 300);
        });
        
        // 遊戲迴圈
        function gameLoop() {
            if (gameActive) {
                if (keys['w'] || keys['ArrowUp']) playerY -= playerSpeed;
                if (keys['s'] || keys['ArrowDown']) playerY += playerSpeed;
                if (keys['a'] || keys['ArrowLeft']) playerX -= playerSpeed;
                if (keys['d'] || keys['ArrowRight']) playerX += playerSpeed;
                
                playerX = Math.max(20, Math.min(window.innerWidth - 20, playerX));
                playerY = Math.max(20, Math.min(window.innerHeight - 20, playerY));
                
                socket.emit('playerMove', { x: playerX, y: playerY, angle: playerAngle });
                
                updatePositions();
                updateBullets();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // 初始化
        createStars();
        gameLoop();
        
        // 處理窗口調整大小
        window.addEventListener('resize', () => {
            if (window.innerWidth && window.innerHeight) {
                playerX = Math.min(playerX, window.innerWidth - 20);
                playerY = Math.min(playerY, window.innerHeight - 20);
                enemyX = Math.min(enemyX, window.innerWidth - 20);
                enemyY = Math.min(enemyY, window.innerHeight - 20);
                updatePositions();
            }
        });
    </script>
</body>
</html>
