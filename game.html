<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射擊對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #0a0a1a;
            overflow: hidden;
            margin: 0;
            padding: 0;
            overscroll-behavior: none;
            touch-action: none;
        }

        .space-background { /* 保持原樣 */ }
        .stars-layer { /* 保持原樣 */ }
        .star { /* 保持原樣 */ }
        @keyframes twinkle { /* 保持原樣 */ }
        canvas { /* 保持原樣 */ }
        .modal { /* 保持原樣 */ }
        .modal-content { /* 保持原樣 */ }
        .input-field { /* 保持原樣 */ }
        .input-field:focus { /* 保持原樣 */ }
        .btn { /* 保持原樣 */ }
        .btn:hover { /* 保持原樣 */ }
        .progress-bar { /* 保持原樣 */ }
        .health-bar { /* 保持原樣 */ }
        .health-fill { /* 保持原樣 */ }
        .score-display { /* 保持原樣 */ }
        .joystick-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 100;
            display: none;
        }
        .joystick-base { /* 保持原樣 */ }
        .joystick-stick { /* 保持原樣 */ }
        .shoot-button { /* 保持原樣 */ }
    </style>
</head>
<body>
    <div class="space-background"></div>
    <div class="stars-layer" id="stars-layer"></div>
    <canvas id="gameCanvas"></canvas>
    <div class="health-bar" style="top: 20px; left: 20px;">
        <div class="health-fill progress-bar" id="playerHealth" style="width: 100%;"></div>
    </div>
    <div class="score-display" style="top: 50px; left: 20px;" id="playerScore">得分: 0</div>
    <div class="health-bar" style="top: 20px; right: 20px;">
        <div class="health-fill progress-bar" id="enemyHealth" style="width: 100%;"></div>
    </div>
    <div class="score-display" style="top: 50px; right: 20px;" id="enemyScore">敵人得分: 0</div>
    <div class="joystick-container" id="joystickContainer">
        <div class="joystick-base">
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    <div class="shoot-button" id="shootButton">射擊</div>
    <div class="modal" id="nameModal" style="display: none;">
        <div class="modal-content">
            <h2 class="text-2xl font-bold text-blue-400 mb-4 text-center">輸入你的名稱</h2>
            <input type="text" id="playerNameInput" class="input-field" placeholder="太空艦長" maxlength="10">
            <div class="flex justify-center mt-4">
                <button id="submitName" class="btn">開始遊戲</button>
            </div>
        </div>
    </div>
    <div class="modal" id="gameOverModal" style="display: none;">
        <div class="modal-content">
            <h2 class="text-2xl font-bold text-blue-400 mb-4 text-center" id="gameOverText"></h2>
            <div class="text-blue-100 text-center mb-4" id="finalScores"></div>
            <div class="flex justify-center">
                <button id="returnToMenu" class="btn">返回主選單</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io('https://game-backed-3.onrender.com'); // **修改處 1**：更新後端 URL
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let playerX = 100, playerY = 300, playerAngle = 0; // **修改處 2**：明確初始化玩家座標
        let enemyX = 700, enemyY = 300, enemyAngle = 180; // **修改處 2**：明確初始化敵人座標
        let playerHealth = 100, enemyHealth = 100;
        let playerScore = 0, enemyScore = 0;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let isShooting = false;
        let joystickActive = false;
        let shootInterval;
        let isGameOver = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            console.log('畫布調整大小:', canvas.width, canvas.height); // **修改處 3**：添加除錯日誌
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // **修改處 5**：初始調整畫布尺寸

        function drawSpaceship(x, y, angle, color, isPlayer) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate((angle * Math.PI) / 180);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-15, 15);
            ctx.lineTo(0, 10);
            ctx.lineTo(15, 15);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = isPlayer ? '#60A5FA' : '#F87171';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
            console.log(`繪製飛船: x=${x}, y=${y}, angle=${angle}, color=${color}`); // **修改處 3**：添加除錯日誌
        }

        function drawBullet(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
        }

        function updateGame() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // **修改處 3**：確保飛船渲染
            drawSpaceship(playerX, playerY, playerAngle, '#1E40AF', true);
            drawSpaceship(enemyX, enemyY, enemyAngle, '#991B1B', false);

            socket.on('gameStateUpdate', ({ players, bullets }) => {
                for (const id in players) {
                    if (id === socket.id) {
                        playerX = players[id].x;
                        playerY = players[id].y;
                        playerAngle = players[id].angle;
                        playerHealth = players[id].health;
                        playerScore = players[id].score;
                    } else {
                        enemyX = players[id].x;
                        enemyY = players[id].y;
                        enemyAngle = players[id].angle;
                        enemyHealth = players[id].health;
                        enemyScore = players[id].score;
                    }
                }
                document.getElementById('playerHealth').style.width = `${playerHealth}%`;
                document.getElementById('enemyHealth').style.width = `${enemyHealth}%`;
                document.getElementById('playerScore').textContent = `得分: ${playerScore}`;
                document.getElementById('enemyScore').textContent = `敵人得分: ${enemyScore}`;
                console.log('遊戲狀態更新:', players, bullets); // **修改處 3**：添加除錯日誌

                bullets.forEach(bullet => {
                    drawBullet(bullet.x, bullet.y);
                });
            });

            requestAnimationFrame(updateGame);
        }

        function handleMovement() {
            const speed = 5;
            let dx = 0, dy = 0;

            if (keys['ArrowUp'] || keys['w']) dy -= speed;
            if (keys['ArrowDown'] || keys['s']) dy += speed;
            if (keys['ArrowLeft'] || keys['a']) dx -= speed;
            if (keys['ArrowRight'] || keys['d']) dx += speed;

            if (joystickActive) {
                const joystickStick = document.getElementById('joystickStick');
                const joystickBase = document.getElementById('joystickContainer');
                const baseRect = joystickBase.getBoundingClientRect();
                const stickRect = joystickStick.getBoundingClientRect();
                const centerX = baseRect.left + baseRect.width / 2;
                const centerY = baseRect.top + baseRect.height / 2;
                const stickX = stickRect.left + stickRect.width / 2;
                const stickY = stickRect.top + stickRect.height / 2;
                const maxDistance = baseRect.width / 2 - stickRect.width / 2;
                dx = ((stickX - centerX) / maxDistance) * speed;
                dy = ((stickY - centerY) / maxDistance) * speed;
            }

            if (dx !== 0 || dy !== 0) {
                playerX = Math.max(0, Math.min(canvas.width, playerX + dx));
                playerY = Math.max(0, Math.min(canvas.height, playerY + dy));
                socket.emit('playerMove', { x: playerX, y: playerY, angle: playerAngle });
            }

            const dxMouse = mouseX - playerX;
            const dyMouse = mouseY - playerY;
            playerAngle = (Math.atan2(dyMouse, dxMouse) * 180) / Math.PI;

            socket.emit('playerMove', { x: playerX, y: playerY, angle: playerAngle });
            console.log('玩家移動發送:', { x: playerX, y: playerY, angle: playerAngle }); // **修改處 3**：添加除錯日誌
        }

        function shootBullet() {
            if (isGameOver) return;
            const bullet = {
                id: `${socket.id}-${Date.now()}`,
                x: playerX,
                y: playerY,
                angle: playerAngle,
                time: Date.now()
            };
            socket.emit('playerShoot', bullet);
            console.log('子彈發射:', bullet); // **修改處 3**：添加除錯日誌
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            handleMovement();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            handleMovement();
        });

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            handleMovement();
        });

        document.addEventListener('mousedown', () => {
            if (!isShooting && !isGameOver) {
                isShooting = true;
                shootBullet();
                shootInterval = setInterval(shootBullet, 200);
            }
        });

        document.addEventListener('mouseup', () => {
            isShooting = false;
            clearInterval(shootInterval);
        });

        const joystickContainer = document.getElementById('joystickContainer');
        const joystickStick = document.getElementById('joystickStick');
        const shootButton = document.getElementById('shootButton');

        if ('ontouchstart' in window) {
            joystickContainer.style.display = 'block'; // **修改處 4**：平板顯示搖桿
            shootButton.style.display = 'flex';

            let touchId = null;

            joystickContainer.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!touchId) {
                    touchId = e.touches[0].identifier;
                    joystickActive = true;
                    handleTouchMove(e);
                }
            });

            joystickContainer.addEventListener('touchmove', handleTouchMove);

            joystickContainer.addEventListener('touchend', (e) => {
                if (e.touches.length === 0 || !Array.from(e.touches).some(t => t.identifier === touchId)) {
                    joystickActive = false;
                    touchId = null;
                    joystickStick.style.transform = 'translate(-50%, -50%)';
                    handleMovement();
                }
            });

            function handleTouchMove(e) {
                if (joystickActive && touchId !== null) {
                    const touch = Array.from(e.touches).find(t => t.identifier === touchId);
                    if (touch) {
                        const baseRect = joystickContainer.getBoundingClientRect();
                        const centerX = baseRect.left + baseRect.width / 2;
                        const centerY = baseRect.top + baseRect.height / 2;
                        const maxDistance = baseRect.width / 2 - joystickStick.getBoundingClientRect().width / 2;
                        let dx = touch.clientX - centerX;
                        let dy = touch.clientY - centerY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance > maxDistance) {
                            const ratio = maxDistance / distance;
                            dx *= ratio;
                            dy *= ratio;
                        }
                        joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
                        handleMovement();
                    }
                }
            }

            shootButton.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!isShooting && !isGameOver) {
                    isShooting = true;
                    shootBullet();
                    shootInterval = setInterval(shootBullet, 200);
                }
            });

            shootButton.addEventListener('touchend', () => {
                isShooting = false;
                clearInterval(shootInterval);
            });
        }

        socket.on('gameOver', ({ winnerId, scores }) => {
            isGameOver = true;
            clearInterval(shootInterval);
            const gameOverModal = document.getElementById('gameOverModal');
            const gameOverText = document.getElementById('gameOverText');
            const finalScores = document.getElementById('finalScores');
            gameOverText.textContent = winnerId === socket.id ? '勝利！' : '失敗！';
            finalScores.textContent = `你的得分: ${scores[socket.id]?.score || 0}  敵人得分: ${scores[Object.keys(scores).find(id => id !== socket.id)]?.score || 0}`;
            gameOverModal.style.display = 'flex';
            console.log('遊戲結束:', winnerId, scores); // **修改處 3**：添加除錯日誌
        });

        document.getElementById('returnToMenu').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        function setupNameInput() {
            const playerName = localStorage.getItem('playerName');
            if (playerName) {
                socket.emit('joinMatchmaking', { name: playerName });
                document.getElementById('nameModal').style.display = 'none'; // **修改處 7**：直接進入配對
                console.log('使用儲存的名稱:', playerName); // **修改處 3**：添加除錯日誌
            } else {
                const nameModal = document.getElementById('nameModal');
                const submitButton = document.getElementById('submitName');
                const nameInput = document.getElementById('playerNameInput');
                submitButton.addEventListener('click', () => {
                    const playerName = nameInput.value.trim() || '太空艦長';
                    localStorage.setItem('playerName', playerName);
                    nameModal.style.display = 'none';
                    socket.emit('joinMatchmaking', { name: playerName });
                    console.log('玩家名稱設置:', playerName); // **修改處 3**：添加除錯日誌
                });
                nameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') submitButton.click();
                });
                setTimeout(() => nameInput.focus(), 500);
            }
        }

        socket.on('connect_error', (error) => {
            console.error('Socket.IO 連線錯誤:', error); // **修改處 3**：添加錯誤日誌
            alert('無法連接到伺服器，請檢查後端服務。'); // **修改處 6**：添加連線錯誤提示
        });

        function createStars() { /* 保持原樣 */ }

        function initialize() {
            createStars();
            setupNameInput();
            updateGame();
            console.log('game.html 初始化完成'); // **修改處 3**：添加初始化日誌
        }

        initialize();
    </script>
</body>
</html>
