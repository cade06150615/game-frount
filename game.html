<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射擊對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #0a0a1a;
            overflow: hidden;
            margin: 0;
            padding: 0;
            overscroll-behavior: none;
            touch-action: none;
        }

        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a2a4a 0%, #0a0a1a 100%);
            z-index: -10;
        }

        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -5;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); }
            50% { opacity: var(--max-opacity); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a2a4a, #0f172a);
            border: 2px solid #3B82F6;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            position: relative;
        }

        .input-field {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 8px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            padding: 0.75rem;
            margin: 1rem 0;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
        }

        .btn {
            background: linear-gradient(to right, #3B82F6, #1D4ED8);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(to right, #2563EB, #1E40AF);
            box-shadow: 0 5px 12px rgba(37, 99, 235, 0.4);
        }

        .progress-bar {
            background: linear-gradient(to right, #3B82F6, #1D4ED8);
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s ease;
        }

        .health-bar {
            position: absolute;
            width: 150px;
            height: 16px;
            background: #1a202c;
            border: 2px solid #4a5568;
            border-radius: 8px;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .health-bar { width: 120px; height: 12px; }
        }

        .health-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .score-display {
            position: absolute;
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            .score-display { font-size: 1rem; }
        }

        .joystick-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 100;
            display: none;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            position: relative;
            border: 2px solid rgba(59, 130, 246, 0.5);
        }

        .joystick-stick {
            width: 40px;
            height: 40px;
            background: #3B82F6;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.7);
        }

        .shoot-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(to right, #EF4444, #B91C1C);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            z-index: 100;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.7);
            display: none;
        }

        .shoot-button:active {
            background: linear-gradient(to right, #B91C1C, #991B1B);
            transform: scale(0.95);
        }

        @media (max-width: 1024px) {
            .joystick-container, .shoot-button { display: block; }
        }
    </style>
</head>
<body>
    <div class="space-background"></div>
    <div class="stars-layer" id="stars-layer"></div>
    <canvas id="gameCanvas"></canvas>

    <div class="modal" id="nameModal" style="display: none;">
        <div class="modal-content">
            <h2 class="text-2xl sm:text-3xl font-bold text-blue-400 mb-4 text-center">輸入你的名稱</h2>
            <input type="text" id="playerNameInput" class="input-field" placeholder="太空艦長" maxlength="10">
            <div class="flex justify-center mt-4">
                <button id="joinGame" class="btn">加入遊戲</button>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="matchmakingModal">
        <div class="modal-content">
            <h2 class="text-2xl sm:text-3xl font-bold text-blue-400 mb-4 text-center" id="matchmakingPlayerName">配對中...</h2>
            <div class="w-full bg-gray-700 rounded-full h-5">
                <div id="matchmakingProgress" class="progress-bar" style="width: 0%"></div>
            </div>
            <p class="text-center text-gray-300 mt-4 text-sm sm:text-base">預計等待時間：<span id="timeLeft">15</span>秒</p>
        </div>
    </div>

    <div class="modal hidden" id="gameOverModal">
        <div class="modal-content">
            <h2 class="text-2xl sm:text-3xl font-bold text-blue-400 mb-4 text-center" id="gameOverMessage"></h2>
            <p class="text-base sm:text-lg text-white mb-2">你的得分：<span id="playerFinalScore"></span></p>
            <p class="text-base sm:text-lg text-white mb-4">對手得分：<span id="opponentFinalScore"></span></p>
            <div class="flex justify-center">
                <button id="returnToMenu" class="btn">返回主選單</button>
            </div>
        </div>
    </div>

    <div class="health-bar" style="top: 15px; left: 15px;">
        <div id="playerHealth" class="health-fill bg-green-500" style="width: 100%"></div>
    </div>
    <div class="health-bar" style="top: 15px; right: 15px;">
        <div id="enemyHealth" class="health-fill bg-red-500" style="width: 100%"></div>
    </div>
    <div class="score-display" style="top: 40px; left: 15px;" id="playerScore">得分: 0</div>
    <div class="score-display" style="top: 40px; right: 15px;" id="enemyScore">對手得分: 0</div>

    <div class="joystick-container" id="joystick">
        <div class="joystick-base">
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>
    <div class="shoot-button" id="shootButton">射擊</div>
